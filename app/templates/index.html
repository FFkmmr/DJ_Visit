<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Дмитрий Жульков — Режиссёр / Продюсер. Видео, где человек важнее формата.">
    <title>Дмитрий Жульков — Режиссёр / Продюсер</title>

    <!-- Google Fonts (Figma stack) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@700&family=Onest:wght@100;200;300;400&family=Original+Surfer&family=Oswald:wght@300;400;700&family=Raleway:wght@700&display=swap" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slide-1.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slide-2.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slide-3.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slide-4.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slide-5.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
</head>
<body>
    <div id="app" x-data="appState()">
        {% include 'components/header.html' %}

        <main class="main">
            {% include 'components/slide-1.html' %}
            {% include 'components/slide-2.html' %}
            {% include 'components/slide-3.html' %}
            {% include 'components/slide-4.html' %}
            {% include 'components/slide-5.html' %}
        </main>

        {% include 'components/footer.html' %}
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/marquee.js') }}"></script>
    <script src="{{ url_for('static', filename='js/video-lazy-load.js') }}"></script>
    <script src="{{ url_for('static', filename='js/typing-animation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/portfolio.js') }}"></script>
    <script src="{{ url_for('static', filename='js/video-player.js') }}"></script>
</body>
</html>
