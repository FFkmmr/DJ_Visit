<section class="section slide-3" id="slide-3" aria-label="Портфолио">
    <h2 class="slide-3__title">ПОРТФОЛИО</h2>

    <!-- Sticky filter -->
    <div class="slide-3__filter-wrap">
        <div class="portfolio__filters" id="portfolio-filters" role="tablist" aria-label="Фильтр портфолио">
            <button type="button" class="filter-btn filter-btn--active" data-filter="all">Все</button>
        </div>
        <div class="slide-3__filter-line" aria-hidden="true"></div>
    </div>

    <!-- Grid (populated by JS) -->
    <div class="slide-3__grid" id="portfolio-grid"
         data-autoplay="{{ 'true' if settings.autoplay else 'false' }}"
         data-columns="{{ settings.columns }}"></div>

    <!-- Empty state -->
    <p class="slide-3__empty" id="portfolio-empty" hidden>
        По выбранному фильтру работ пока нет.
    </p>

    <!-- Load more -->
    <div class="slide-3__load-more-wrap">
        <button type="button" class="slide-3__load-more" id="load-more-btn">
            ЗАГРУЗИТЬ ЕЩЁ
        </button>
    </div>
</section>

<!-- Portfolio modal -->
<div class="pf-modal" id="pf-modal" aria-modal="true" role="dialog" aria-label="Просмотр работы" hidden>
    <div class="pf-modal__overlay" id="pf-modal-overlay"></div>
    <div class="pf-modal__panel">
        <!-- desktop: absolute close + side arrows -->
        <button class="pf-modal__close pf-modal__close--desktop" id="pf-modal-close" aria-label="Закрыть">&#x2715;</button>
        <button class="pf-modal__arrow pf-modal__arrow--prev pf-modal__arrow--desktop" id="pf-modal-prev" aria-label="Предыдущая">&#8592;</button>
        <button class="pf-modal__arrow pf-modal__arrow--next pf-modal__arrow--desktop" id="pf-modal-next" aria-label="Следующая">&#8594;</button>

        <div class="pf-modal__content">
            <div class="pf-modal__video-wrap">
                <video
                    id="pf-modal-video"
                    class="pf-modal__video"
                    controls
                    playsinline
                    preload="metadata"
                ></video>
            </div>

            <!-- Related videos strip -->
            <div class="pf-modal__related" id="pf-modal-related" hidden>
                <button class="pf-modal__related-arrow pf-modal__related-arrow--prev" id="pf-related-prev" aria-label="Назад">&#8592;</button>
                <div class="pf-modal__related-track-wrap">
                    <ul class="pf-modal__related-track" id="pf-related-track"></ul>
                </div>
                <button class="pf-modal__related-arrow pf-modal__related-arrow--next" id="pf-related-next" aria-label="Вперёд">&#8594;</button>
            </div>

            <div class="pf-modal__info">
                <h3 class="pf-modal__title" id="pf-modal-title"></h3>
                <p class="pf-modal__subtitle" id="pf-modal-subtitle"></p>
                <div class="pf-modal__tags" id="pf-modal-tags"></div>
                <p class="pf-modal__desc" id="pf-modal-desc"></p>
            </div>
        </div>

        <!-- mobile: inline nav bar at bottom -->
        <div class="pf-modal__nav">
            <button class="pf-modal__nav-btn pf-modal__nav-btn--prev" id="pf-modal-prev-m" aria-label="Предыдущая">&#8592;</button>
            <button class="pf-modal__nav-btn pf-modal__nav-btn--close" id="pf-modal-close-m" aria-label="Закрыть">&#x2715;</button>
            <button class="pf-modal__nav-btn pf-modal__nav-btn--next" id="pf-modal-next-m" aria-label="Следующая">&#8594;</button>
        </div>
    </div>
</div>
